<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YSNF Airport Diagram — FlightOps Academy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; padding: 1rem; color: #1a1a1a; }
  h1 { font-size: 16px; font-weight: 500; margin-bottom: 12px; color: #1a1a1a; }
  #diagram-area { background: #c8dba8; border-radius: 12px; overflow: hidden; }
  #airport-svg { display: block; width: 100%; }
  .hot { cursor: pointer; transition: opacity .15s; }
  .hot:hover { opacity: .75; }
  #panel { background: white; border: 1px solid #e0e0d8; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 12px; min-height: 80px; display: none; }
  #panel-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin: 0 0 6px; }
  #panel-body { font-size: 13px; color: #555; line-height: 1.6; margin: 0; white-space: pre-line; }
  #panel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .tag-blue { background: #dbeafe; color: #1e40af; }
  .tag-green { background: #dcfce7; color: #166534; }
  .tag-amber { background: #fef3c7; color: #92400e; }
  .tag-red { background: #fee2e2; color: #991b1b; }
  #hint { font-size: 12px; color: #888; margin-top: 8px; text-align: center; }
  p.credit { font-size: 11px; color: #aaa; margin-top: 8px; text-align: right; }
</style>
</head>

<p id="hint">Click any area of the airport to learn about it</p>

<div id="panel">

  <p id="panel-body"></p>
  <div id="panel-tags"></div>
</div>

<p class="credit">FlightOps Academy — YSNF reference diagram. Not for navigation.</p>

<script>
const data = {
  runway:{title:'Runway 11/29',body:'The single sealed runway at YSNF runs roughly east–west. It is 1,951m long and 45m wide, asphalt surface. Runway 11 faces east (magnetic heading approx 110°) and Runway 29 faces west (approx 290°). With a single runway, when it is closed the aerodrome is closed.\n\nThe runway has a slight downslope from the 29 threshold to the 11 threshold. Terrain drops sharply beyond both thresholds — aircraft performance calculations must account for this.',tags:[['1,951m × 45m','blue'],['asphalt','green'],['code 4C','blue'],['elev 371ft AMSL','green']]},
  strip:{title:'Runway strip',body:'The runway strip is the graded and cleared area extending 150m either side of the runway centreline and beyond each threshold. It must be kept clear of obstacles and inspected as part of every routine runway inspection.\n\nCheck for erosion into the strip, vegetation above strip level, and wildlife in the undershoot areas.',tags:[['150m width','blue'],['MOS Part 139','amber'],['inspect daily','green']]},
  tdr:{title:'Touchdown zone',body:'The touchdown zone (TDZ) is the first 900m of runway from each threshold. It receives the highest stress of any runway area and accumulates rubber deposits over time.\n\nRubber build-up reduces friction and can cause aquaplaning in wet conditions. Inspect TDZ markings for visibility and check for rubber contamination regularly.',tags:[['first 900m','blue'],['rubber accumulation risk','amber'],['high wear area','amber']]},
  rubber:{title:'Rubber accumulation zone',body:'Rubber deposits from landing aircraft accumulate primarily 200–500m from each threshold. Over time these reduce pavement friction, particularly when wet.\n\nWhen a smooth, dark, rubber-contaminated surface is visible, report to maintenance and consider a friction assessment. MOS Part 139 specifies minimum friction values.',tags:[['friction hazard','amber'],['schedule removal','amber'],['MOS 139 s4.13','blue']]},
  twy:{title:'Taxiway Alpha',body:'The primary taxiway connection between the runway and the apron. Aircraft use Taxiway Alpha to vacate after landing. The remainder uses backtrack — aircraft taxi back along the runway to the opposite threshold.\n\nCheck for surface condition, yellow edge markings, hold-short markings at the runway intersection, and blue taxiway edge lights.',tags:[['blue edge lights','blue'],['hold-short markings','amber'],['inspect daily','green']]},
  apron:{title:'Apron — bays 1, 2 and GA',body:'Bay 1 accommodates the RPT aircraft (ATR 72). Bay 2 serves charter and GA. Fuel storage is at the southern apron edge — maintain 15m no-smoking zone during refuelling.\n\nThe apron is exposed to prevailing winds — jet blast and prop wash from ATR 72 engines can affect personnel and unsecured equipment. No vehicle enters the aircraft safety zone without ground handler supervision.',tags:[['Bay 1 — RPT','blue'],['Bay 2 — charter','green'],['fuel storage south edge','amber']]},
  terminal:{title:'Terminal building',body:'The terminal is on the landside/airside boundary. All access points must be controlled — doors and gates locked when not in active use.\n\nBiosecurity inspections for arriving passengers from Australia occur in the terminal. Coordinate with biosecurity officers to ensure turnaround sequence allows sufficient inspection time.',tags:[['ASIC boundary','blue'],['biosecurity point','amber'],['access controlled','green']]},
  papi:{title:'PAPI — Precision Approach Path Indicator',body:'PAPIs at both thresholds provide visual glidepath guidance at 3.0°.\n\n4 white = too high\n3 white 1 red = slightly high\n2 white 2 red = ON GLIDEPATH\n1 white 3 red = slightly low\n4 red = dangerously low\n\nCheck PAPIs on every opening inspection — drive the approach and confirm 2 red / 2 white from the approach direction. A misaligned PAPI must be taken out of service immediately and a NOTAM issued.',tags:[['3.0° glidepath','blue'],['check every opening','amber'],['NOTAM if U/S','red']]},
  beacon:{title:'Aerodrome beacon',body:'The rotating beacon alternates white and green — the standard signal for a civil land aerodrome. It operates from dusk to dawn or when visibility is reduced.\n\nCheck that the beacon is rotating and both colours are visible during low-light opening inspections. If unserviceable during reduced visibility, a NOTAM is required.',tags:[['white/green = civil','blue'],['dusk to dawn','green'],['NOTAM if U/S in low vis','amber']]},
  ops:{title:'Operations room',body:'Your base of operations during every shift. Must contain the current aerodrome manual, Airport Emergency Plan, contact lists, access to NAIPS, weather services, and all inspection forms.\n\nComplete all desk checks — weather, NOTAMs, traffic schedule — before going outside. This is also the emergency coordination point during a declared emergency.',tags:[['aerodrome manual here','blue'],['NAIPS access','green'],['emergency coordination point','red']]},
  ols:{title:'Obstacle Limitation Surfaces (OLS)',body:'The OLS is the three-dimensional protected airspace around the aerodrome within which obstacles must not penetrate. Any crane, vehicle, or structure that would penetrate the OLS requires a NOTAM and may require a runway closure.\n\nAs WSO, calculate the maximum height of works equipment at its working position and check against OLS diagrams in the aerodrome manual before authorising.',tags:[['approach surface','blue'],['WSO responsibility','amber'],['NOTAM if penetrated','red']]},
  wildlife:{title:'Wildlife hazard zones',body:'Areas beyond the runway thresholds and along the runway strip are the primary wildlife hazard zones. Birds congregate here to feed in the early morning.\n\nKey species: Masked Booby (large, slow to react — high strike risk), White Tern, Black Noddy, Red-tailed Tropicbird. The Norfolk Island Green Parrot is critically endangered — do not use dispersal methods that could injure one.\n\nWildlife activity is elevated June–October during whale migration season.',tags:[['Masked Booby — high risk','red'],['Green Parrot — protected','amber'],['worst: early morning','amber']]}
};
function show(k){
  const d=data[k]; if(!d) return;
  document.getElementById('panel').style.display='block';
  document.getElementById('hint').style.display='none';
  document.getElementById('panel-title').textContent=d.title;
  document.getElementById('panel-body').textContent=d.body;
  document.getElementById('panel-tags').innerHTML=d.tags.map(([t,c])=>`<span class="tag tag-${c}">${t}</span>`).join('');
}
</script>
